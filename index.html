  <script src="/_sdk/0f620e7ef74834b7.editing_sdk.js" integrity="sha512-lIpWd9O7x1sKwBnjNH9J7/eTBLJGkf7n9/wFnpqN+1F13ihXMO5RKTyR0DpZa/r+dIVMSGocs367wfzX+y3hew=="></script>
  <script src="/_sdk/0179d719c431a79e.data_sdk.js" integrity="sha512-OsRvJkI5GkC3MJQcgotQYotpzrMSX415GiKKgvYdxQEEkzD/fdchShO2FMSy0PJr/tiINMXOk5Vl2zAgg6bUiA=="></script>
  <script>
    // === State ===
    let tasks = [];
    let currentPage = 1;
    const perPage = 10;
    let sortField = 'created_at';
    let sortDir = -1;
    let editingId = null;
    let deletingRecord = null;

    // === Data SDK ===
    const dataHandler = {
        onDataChanged(data) {
            tasks = data;
            updateStats();
            renderTasks();
        }
    };

    (async () => {
        const r = await window.dataSdk.init(dataHandler);
        if (!r.isOk) showToast('Lỗi kết nối dữ liệu', 'error');
        lucide.createIcons();
    })();

    // === Stats ===
    function updateStats() {
        document.getElementById('stat-total').textContent = tasks.length;
        document.getElementById('stat-new').textContent = tasks.filter(t => t.status === 'todo').length;
        document.getElementById('stat-done').textContent = tasks.filter(t => t.status === 'done').length;
        document.getElementById('stat-pending').textContent = tasks.filter(t => t.status === 'progress').length;
    }

    // === Render Tasks ===
    function getFilteredTasks() {
        const search = document.getElementById('search-input').value.toLowerCase();
        const status = document.getElementById('filter-status').value;
        const priority = document.getElementById('filter-priority').value;
        let filtered = tasks.filter(t => {
            if (search && !t.title?.toLowerCase().includes(search) && !t.description?.toLowerCase().includes(search)) return false;
            if (status && t.status !== status) return false;
            if (priority && t.priority !== priority) return false;
            return true;
        });
        filtered.sort((a, b) => {
            const av = a[sortField] || '';
            const bv = b[sortField] || '';
            return av < bv ? -sortDir : av > bv ? sortDir : 0;
        });
        return filtered;
    }

    function renderTasks() {
        const filtered = getFilteredTasks();
        const tbody = document.getElementById('task-tbody');
        const empty = document.getElementById('empty-state');
        const total = filtered.length;
        const pages = Math.ceil(total / perPage) || 1;
        if (currentPage > pages) currentPage = pages;
        const start = (currentPage - 1) * perPage;
        const pageItems = filtered.slice(start, start + perPage);

        if (total === 0) {
            tbody.innerHTML = '';
            empty.classList.remove('hidden');
        } else {
            empty.classList.add('hidden');
            tbody.innerHTML = pageItems.map(t => `
                <tr class="task-row border-b border-slate-50">
                    <td class="px-4 py-3 font-medium text-slate-800">${esc(t.title)}</td>
                    <td class="px-4 py-3 hidden md:table-cell"><span class="px-2 py-1 rounded-lg bg-slate-100 text-xs">${catLabel(t.category)}</span></td>
                    <td class="px-4 py-3"><span class="px-2 py-1 rounded-lg text-xs font-medium ${statusClass(t.status)}">${statusLabel(t.status)}</span></td>
                    <td class="px-4 py-3"><span class="px-2 py-1 rounded-lg text-xs font-medium ${priorityClass(t.priority)}">${priorityLabel(t.priority)}</span></td>
                    <td class="px-4 py-3 hidden lg:table-cell text-slate-600">${esc(t.assigned_to || '—')}</td>
                    <td class="px-4 py-3 hidden lg:table-cell text-slate-600">${t.due_date || '—'}</td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="editTask('${t.__backendId}')" class="p-1 hover:bg-slate-100 rounded"><i data-lucide="edit-2" class="w-4 h-4 text-slate-500"></i></button>
                        <button onclick="confirmDelete('${t.__backendId}')" class="p-1 hover:bg-red-50 rounded"><i data-lucide="trash-2" class="w-4 h-4 text-red-400"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        document.getElementById('page-info').textContent = `${start+1}-${Math.min(start+perPage, total)} / ${total}`;
        document.getElementById('prev-page').disabled = currentPage <= 1;
        document.getElementById('next-page').disabled = currentPage >= pages;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function statusLabel(s) { return { todo: 'Cần làm', progress: 'Đang làm', done: 'Hoàn thành' }[s] || s; }
    function statusClass(s) { return { todo: 'status-todo', progress: 'status-progress', done: 'status-done' }[s] || ''; }
    function priorityLabel(p) { return { high: 'Cao', medium: 'TB', low: 'Thấp' }[p] || p; }
    function priorityClass(p) { return { high: 'priority-high', medium: 'priority-medium', low: 'priority-low' }[p] || ''; }
    function catLabel(c) { return { general: 'Chung', dev: 'Dev', design: 'Design', marketing: 'Marketing', meeting: 'Họp' }[c] || c; }

    // === Filters & Pagination ===
    document.getElementById('search-input').addEventListener('input', () => { currentPage = 1; renderTasks(); });
    document.getElementById('filter-status').addEventListener('change', () => { currentPage = 1; renderTasks(); });
    document.getElementById('filter-priority').addEventListener('change', () => { currentPage = 1; renderTasks(); });
    document.getElementById('prev-page').addEventListener('click', () => { currentPage--; renderTasks(); });
    document.getElementById('next-page').addEventListener('click', () => { currentPage++; renderTasks(); });

    // Sort
    document.querySelectorAll('[data-sort]').forEach(th => {
        th.addEventListener('click', () => { sortField = th.dataset.sort; sortDir *= -1; renderTasks(); });
    });

    // === CRUD ===
    document.getElementById('add-task-btn').addEventListener('click', () => openModal());
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('task-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    function openModal(task) {
        editingId = task ? task.__backendId : null;
        document.getElementById('modal-title').textContent = task ? 'Sửa công việc' : 'Thêm công việc';
        document.getElementById('task-title').value = task?.title || '';
        document.getElementById('task-category').value = task?.category || 'general';
        document.getElementById('task-priority').value = task?.priority || 'low';
        document.getElementById('task-status').value = task?.status || 'todo';
        document.getElementById('task-due').value = task?.due_date || '';
        document.getElementById('task-assigned').value = task?.assigned_to || '';
        document.getElementById('task-desc').value = task?.description || '';
        document.getElementById('task-modal').classList.remove('hidden');
        document.getElementById('task-modal').classList.add('flex');
    }

    function closeModal() {
        document.getElementById('task-modal').classList.add('hidden');
        document.getElementById('task-modal').classList.remove('flex');
    }

    function editTask(id) {
        const t = tasks.find(x => x.__backendId === id);
        if (t) openModal(t);
    }

    document.getElementById('task-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('[type=submit]');
        btn.disabled = true; btn.textContent = 'Đang lưu...';

        const data = {
            title: document.getElementById('task-title').value.trim(),
            category: document.getElementById('task-category').value,
            priority: document.getElementById('task-priority').value,
            status: document.getElementById('task-status').value,
            due_date: document.getElementById('task-due').value,
            assigned_to: document.getElementById('task-assigned').value.trim(),
            description: document.getElementById('task-desc').value.trim(),
            updated_at: new Date().toISOString()
        };

        let result;
        if (editingId) {
            const record = tasks.find(t => t.__backendId === editingId);
            result = await window.dataSdk.update({ ...record, ...data });
        } else {
            if (tasks.length >= 999) { showToast('Đã đạt giới hạn 999 công việc!', 'error'); btn.disabled = false; btn.textContent = 'Lưu công việc'; return; }
            data.created_at = new Date().toISOString();
            result = await window.dataSdk.create(data);
        }

        if (result.isOk) { showToast(editingId ? 'Đã cập nhật!' : 'Đã thêm!', 'success'); closeModal(); }
        else showToast('Lỗi lưu dữ liệu', 'error');
        btn.disabled = false; btn.textContent = 'Lưu công việc';
    });

    // Delete
    function confirmDelete(id) {
        deletingRecord = tasks.find(t => t.__backendId === id);
        document.getElementById('delete-confirm').classList.remove('hidden');
        document.getElementById('delete-confirm').classList.add('flex');
    }
    document.getElementById('delete-cancel').addEventListener('click', () => { document.getElementById('delete-confirm').classList.add('hidden'); document.getElementById('delete-confirm').classList.remove('flex'); });
    document.getElementById('delete-ok').addEventListener('click', async () => {
        if (!deletingRecord) return;
        const btn = document.getElementById('delete-ok');
        btn.disabled = true; btn.textContent = 'Đang xóa...';
        const r = await window.dataSdk.delete(deletingRecord);
        if (r.isOk) showToast('Đã xóa!', 'success');
        else showToast('Lỗi xóa', 'error');
        btn.disabled = false; btn.textContent = 'Xóa';
        document.getElementById('delete-confirm').classList.add('hidden');
        document.getElementById('delete-confirm').classList.remove('flex');
    });

    // === Export/Import ===
    document.getElementById('export-btn').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tasks-backup.json'; a.click();
    });
    document.getElementById('import-input').addEventListener('change', async (e) => {
        const file = e.target.files[0]; if (!file) return;
        try {
            const text = await file.text();
            const imported = JSON.parse(text);
            if (!Array.isArray(imported)) throw new Error();
            let count = 0;
            for (const item of imported) {
                if (tasks.length + count >= 999) break;
                await window.dataSdk.create({ title: item.title || 'Imported', category: item.category || 'general', status: item.status || 'todo', priority: item.priority || 'low', description: item.description || '', assigned_to: item.assigned_to || '', due_date: item.due_date || '', created_at: item.created_at || new Date().toISOString(), updated_at: new Date().toISOString() });
                count++;
            }
            showToast(`Đã nhập ${count} công việc`, 'success');
        } catch { showToast('File không hợp lệ', 'error'); }
        e.target.value = '';
    });

    // === Settings ===
    document.getElementById('settings-toggle').addEventListener('click', () => { document.getElementById('settings-modal').classList.remove('hidden'); document.getElementById('settings-modal').classList.add('flex'); document.getElementById('api-key-input').value = localStorage.getItem('gemini_api_key') || ''; document.getElementById('model-select').value = localStorage.getItem('gemini_model') || 'gemini-2.5-flash'; });
    document.getElementById('settings-close').addEventListener('click', () => { document.getElementById('settings-modal').classList.add('hidden'); document.getElementById('settings-modal').classList.remove('flex'); });
    document.getElementById('settings-modal').addEventListener('click', e => { if (e.target === e.currentTarget) { e.target.classList.add('hidden'); e.target.classList.remove('flex'); } });
    document.getElementById('toggle-key-vis').addEventListener('click', () => { const inp = document.getElementById('api-key-input'); inp.type = inp.type === 'password' ? 'text' : 'password'; });
    document.getElementById('save-settings').addEventListener('click', () => { localStorage.setItem('gemini_api_key', document.getElementById('api-key-input').value.trim()); localStorage.setItem('gemini_model', document.getElementById('model-select').value); showToast('Đã lưu cài đặt', 'success'); document.getElementById('settings-modal').classList.add('hidden'); document.getElementById('settings-modal').classList.remove('flex'); });

    // === AI ===
    const MODELS = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-1.5-pro'];

    async function callGemini(prompt, idx = 0) {
        const key = localStorage.getItem('gemini_api_key');
        const model = localStorage.getItem('gemini_model') || MODELS[0];
        if (!key) { showToast('Vui lòng nhập API Key trong Cài đặt', 'error'); return null; }
        const useModel = idx === 0 ? model : (MODELS[idx] || MODELS[0]);
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${useModel}:generateContent?key=${key}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 4096 } })
            });
            if ([500, 503].includes(res.status) && idx < MODELS.length - 1) return callGemini(prompt, idx + 1);
            if (res.status === 401 || res.status === 403) throw new Error('API Key không hợp lệ');
            if (res.status === 429) throw new Error('Đã hết quota API');
            if (!res.ok) throw new Error(`Lỗi ${res.status}`);
            const data = await res.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        } catch (err) {
            if (idx < MODELS.length - 1 && !err.message.includes('Key') && !err.message.includes('quota')) return callGemini(prompt, idx + 1);
            showToast('Lỗi AI: ' + err.message, 'error'); return null;
        }
    }

    document.getElementById('ai-panel-toggle').addEventListener('click', () => { document.getElementById('ai-panel').classList.toggle('translate-x-full'); });
    document.getElementById('ai-panel-close').addEventListener('click', () => { document.getElementById('ai-panel').classList.add('translate-x-full'); });

    document.querySelectorAll('.ai-prompt-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const type = btn.dataset.prompt;
            const summary = JSON.stringify(tasks.map(t => ({ title: t.title, status: t.status, priority: t.priority, category: t.category, due: t.due_date, assigned: t.assigned_to })));
            let prompt = '';
            if (type === 'analyze') prompt = `Phân tích tổng quan danh sách công việc sau và đưa ra nhận xét chi tiết bằng tiếng Việt:\n${summary}`;
            else if (type === 'suggest') prompt = `Dựa vào danh sách công việc sau, gợi ý thứ tự ưu tiên và lý do bằng tiếng Việt:\n${summary}`;
            else prompt = `Tạo báo cáo tóm tắt tuần cho danh sách công việc sau bằng tiếng Việt, dùng markdown:\n${summary}`;

            document.getElementById('ai-loading').classList.remove('hidden');
            document.getElementById('ai-response').classList.add('hidden');
            const result = await callGemini(prompt);
            document.getElementById('ai-loading').classList.add('hidden');
            if (result) {
                document.getElementById('ai-response').innerHTML = marked.parse(result);
                document.getElementById('ai-response').classList.remove('hidden');
            }
        });
    });

    // === Toast ===
    function showToast(msg, type = 'success') {
        const el = document.getElementById('toast');
        const colors = { success: 'bg-emerald-500', error: 'bg-red-500', warning: 'bg-amber-500' };
        el.querySelector('div').className = `px-4 py-3 rounded-xl card-shadow text-sm font-medium text-white flex items-center gap-2 fade-in ${colors[type] || colors.success}`;
        el.querySelector('div').textContent = msg;
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 3000);
    }
